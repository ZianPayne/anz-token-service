openapi: 3.0.3
info:
  title: Tokenization Service
  description: A simple tokenization service for payment account numbers. Built for the ANZ coding assesment
  version: 1.0.0

servers:
  - url: http://localhost:3000

paths:
  /tokenize:
    post:
      tags:
        - Token
      operationId: tokenize
      summary: Swap a collection of account numbers for tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountNumbers'
      responses:
        '200':
          description: Successfully tokenized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tokens'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /detokenize:
    post:
      tags:
        - Token
      operationId: detokenize
      summary: Swap a collection of tokens back for the original account numbers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tokens'
      responses:
        '200':
          description: Successfully detokenized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountNumbers'
        '404':
          description: One or more tokens not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    AccountNumber:
      type: object
      required:
        - value
      properties:
        value:
          type: string
          pattern: '^\d{4}-\d{4}-\d{4}-\d{4}$'
          minLength: 19
          maxLength: 19
          example: '4111-1111-1111-1111'

    AccountNumbers:
      type: object
      required:
        - accountNumbers
      properties:
        accountNumbers:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/AccountNumber'
      example:
        accountNumbers:
          - value: '4111-1111-1111-1111'
          - value: '4444-3333-2222-1111'

    Token:
      type: object
      required:
        - value
      properties:
        value:
          type: string
          pattern: '^[A-Za-z0-9]{32}$'
          minLength: 32
          maxLength: 32
          example: 'fvMymE7X0Je1IzMDgWooV5iGBPw0yoFy'

    Tokens:
      type: object
      required:
        - tokens
      properties:
        tokens:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Token'
      example:
        tokens:
          - value: 'fvMymE7X0Je1IzMDgWooV5iGBPw0yoFy'

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: 'BAD_REQUEST'
        message:
          type: string
          example: 'Invalid request'
          